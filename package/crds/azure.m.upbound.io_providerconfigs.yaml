---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: providerconfigs.azure.m.upbound.io
spec:
  group: azure.m.upbound.io
  names:
    categories:
    - crossplane
    - providerconfig
    - azure
    kind: ProviderConfig
    listKind: ProviderConfigList
    plural: providerconfigs
    singular: providerconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    - jsonPath: .spec.credentials.secretRef.name
      name: SECRET-NAME
      priority: 1
      type: string
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: A ProviderConfig configures the Azure provider.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: A ProviderConfigSpec defines the desired state of a ProviderConfig.
            properties:
              clientID:
                description: |-
                  ClientID is the client ID of the managed identity or service principal.
                  When Credentials.Source is `InjectedIdentity` (MSI), this selects a
                  user-assigned identity; if unset, the system-assigned identity is used.
                  When Credentials.Source is `OIDCTokenFile`, this field is optional: if
                  unset, the value is read from the AZURE_CLIENT_ID environment variable,
                  which the Azure Workload Identity webhook injects per pod from the
                  ServiceAccount annotation. This allows a single ClusterProviderConfig to
                  serve multiple providers, each using its own managed identity.
                type: string
              credentials:
                description: Credentials required to authenticate to this provider.
                properties:
                  env:
                    description: |-
                      Env is a reference to an environment variable that contains credentials
                      that must be used to connect to the provider.
                    properties:
                      name:
                        description: Name is the name of an environment variable.
                        type: string
                    required:
                    - name
                    type: object
                  fs:
                    description: |-
                      Fs is a reference to a filesystem location that contains credentials that
                      must be used to connect to the provider.
                    properties:
                      path:
                        description: Path is a filesystem path.
                        type: string
                    required:
                    - path
                    type: object
                  secretRef:
                    description: |-
                      A SecretRef is a reference to a secret key that contains the credentials
                      that must be used to connect to the provider.
                    properties:
                      key:
                        description: The key to select.
                        type: string
                      name:
                        description: Name of the secret.
                        type: string
                      namespace:
                        description: Namespace of the secret.
                        type: string
                    required:
                    - key
                    - name
                    - namespace
                    type: object
                  source:
                    description: Source of the provider credentials.
                    enum:
                    - None
                    - Secret
                    - UserAssignedManagedIdentity
                    - SystemAssignedManagedIdentity
                    - OIDCTokenFile
                    - Upbound
                    - Filesystem
                    type: string
                required:
                - source
                type: object
              environment:
                description: |-
                  The Cloud Environment which should be used. Possible values are "public",
                  "usgovernment", "german", and "china". Defaults to "public".
                type: string
              features:
                description: |-
                  Features configures optional behaviors of the underlying Terraform
                  AzureRM provider, mirroring its `features` block.
                properties:
                  postgreSQLFlexibleServer:
                    description: PostgreSQLFlexibleServer configures behaviors specific
                      to Azure PostgreSQL Flexible Servers
                    properties:
                      restartServerOnConfigurationValueChange:
                        description: Should the PostgreSQL Flexible Server restart
                          after static server parameter change or removal?
                        type: boolean
                    type: object
                type: object
              msiEndpoint:
                description: |-
                  MSIEndpoint is the optional path to a custom endpoint for
                  Managed Service Identity.
                type: string
              oidcTokenFilePath:
                description: |-
                  OIDCTokenFilePath is the optional path to a token file
                  that allows to access a managed identity.
                type: string
              reconciliationPolicy:
                description: |-
                  ReconciliationPolicy configures how a managed resource is reconciled.
                  It currently allows overriding the controller's failure rate limiter
                  parameters on a per-resource basis via ExponentialFailureRateLimiter.
                properties:
                  exponentialFailureRateLimiter:
                    description: |-
                      ExponentialFailureRateLimiter, when set, overrides the parameters of the
                      exponential failure rate limiter used to schedule retries for the
                      managed resource that this policy applies to.
                    properties:
                      baseDelay:
                        description: BaseDelay is the initial delay between retries.
                        type: string
                        x-kubernetes-validations:
                        - message: baseDelay must be at least 1s
                          rule: duration(self) >= duration('1s')
                      maxDelay:
                        description: MaxDelay is the maximum delay between retries.
                        type: string
                        x-kubernetes-validations:
                        - message: maxDelay must be at least 60s
                          rule: duration(self) >= duration('60s')
                    type: object
                    x-kubernetes-validations:
                    - message: maxDelay must be greater than or equal to baseDelay
                      rule: '!has(self.maxDelay) || !has(self.baseDelay) || duration(self.maxDelay)
                        >= duration(self.baseDelay)'
                type: object
                x-kubernetes-validations:
                - message: when maxDelay is omitted it defaults to 60s; baseDelay
                    must be <= 60s
                  rule: '!has(self.exponentialFailureRateLimiter) || !has(self.exponentialFailureRateLimiter.baseDelay)
                    || has(self.exponentialFailureRateLimiter.maxDelay) || duration(self.exponentialFailureRateLimiter.baseDelay)
                    <= duration(''60s'')'
              storageUseAzureAD:
                description: |-
                  StorageUseAzureAD configures Provider to use AzureAD
                  to connect to the Storage Blob & Queue APIs,
                  rather than the SharedKey from the Storage Account.
                type: boolean
              subscriptionID:
                description: |-
                  SubscriptionID is the Azure subscription ID to be used.
                  If unset, subscription ID from Credentials will be used.
                  Required if Credentials.Source is InjectedIdentity.
                type: string
              tenantID:
                description: |-
                  TenantID is the Azure AD tenant ID to be used.
                  If unset, tenant ID from Credentials will be used.
                  Required if Credentials.Source is InjectedIdentity.
                  When Credentials.Source is `OIDCTokenFile`, this field is optional: if
                  unset, the value is read from the AZURE_TENANT_ID environment variable,
                  which the Azure Workload Identity webhook injects per pod.
                type: string
            required:
            - credentials
            type: object
          status:
            description: A ProviderConfigStatus reflects the observed state of a ProviderConfig.
            properties:
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              users:
                description: Users of this provider configuration.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
