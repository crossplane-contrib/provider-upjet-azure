apiVersion: dbformysql.azure.m.upbound.io/v1beta1
kind: FlexibleServerActiveDirectoryAdministrator
metadata:
  annotations:
    meta.upbound.io/example-id: dbformysql/v1beta1/flexibleserveractivedirectoryadministrator
  labels:
    testing.upbound.io/example-name: flexibleserveractivedirectoryadministratorns
  name: flexibleserveractivedirectoryadministratorns
  namespace: upbound-system
spec:
  forProvider:
    identityIdSelector:
      matchLabels:
        testing.upbound.io/example-name: flexibleserveractivedirectoryadministratorns
    login: newsqladmin
    objectId: ${data.azurerm_client_config.current.client_id}
    serverIdSelector:
      matchLabels:
        testing.upbound.io/example-name: flexibleserveractivedirectoryadministratorns
    tenantId: ${data.azurerm_client_config.current.tenant_id}

---

apiVersion: dbformysql.azure.m.upbound.io/v1beta1
kind: FlexibleServer
metadata:
  annotations:
    meta.upbound.io/example-id: dbformysql/v1beta1/flexibleserveractivedirectoryadministrator
  labels:
    testing.upbound.io/example-name: flexibleserveractivedirectoryadministratorns
  name: flexibleserveractivedirectoryadministratorns-${Rand.RFC1123Subdomain}
  namespace: upbound-system
spec:
  forProvider:
    administratorLogin: mysqladmin
    administratorPasswordSecretRef:
      key: example-key
      name: example-secret
    identity:
      type: UserAssigned
      identityIdsSelector:
        matchLabels:
          testing.upbound.io/example-name: flexibleserveractivedirectoryadministratorns
    location: West Europe
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: flexibleserveractivedirectoryadministratorns
    skuName: B_Standard_B1ms
    publicNetworkAccess: Enabled

---

apiVersion: azure.m.upbound.io/v1beta1
kind: ResourceGroup
metadata:
  annotations:
    meta.upbound.io/example-id: dbformysql/v1beta1/flexibleserveractivedirectoryadministrator
  labels:
    testing.upbound.io/example-name: flexibleserveractivedirectoryadministratorns
  name: flexibleserveractivedirectoryadministratorns
  namespace: upbound-system
spec:
  forProvider:
    location: West Europe

---

apiVersion: managedidentity.azure.m.upbound.io/v1beta1
kind: UserAssignedIdentity
metadata:
  annotations:
    meta.upbound.io/example-id: dbformysql/v1beta1/flexibleserveractivedirectoryadministrator
  labels:
    testing.upbound.io/example-name: flexibleserveractivedirectoryadministratorns
  name: flexibleserveractivedirectoryadministratorns
  namespace: upbound-system
spec:
  forProvider:
    location: West Europe
    name: flexibleserveractivedirectoryadministratorns
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: flexibleserveractivedirectoryadministratorns

---

apiVersion: v1
data:
  example-key: dXBiMHVuZHIwY2s1ITMxMzM3Cg==
kind: Secret
metadata:
  name: example-secret
  namespace: upbound-system
type: Opaque