apiVersion: eventhub.azure.m.upbound.io/v1beta1
kind: Cluster
metadata:
  annotations:
    meta.upbound.io/example-id: eventhub/v1beta1/cluster
    upjet.upbound.io/manual-intervention: "Cluster 'XYZ' cannot be deleted until at least 4 hours after its created time. Please retry this operation at that time."
  labels:
    testing.upbound.io/example-name: eventhubclusterv1beta1ns
  name: eventhubclusterv1beta1ns
  namespace: upbound-system
spec:
  forProvider:
    location: West Europe
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: eventhubclusterv1beta1ns
    skuName: Dedicated_1

---

apiVersion: azure.m.upbound.io/v1beta1
kind: ResourceGroup
metadata:
  annotations:
    meta.upbound.io/example-id: eventhub/v1beta1/cluster
    upjet.upbound.io/manual-intervention: "Cluster 'XYZ' cannot be deleted until at least 4 hours after its created time. Please retry this operation at that time."
  labels:
    testing.upbound.io/example-name: eventhubclusterv1beta1ns
  name: eventhubclusterv1beta1ns
  namespace: upbound-system
spec:
  forProvider:
    location: West Europe
