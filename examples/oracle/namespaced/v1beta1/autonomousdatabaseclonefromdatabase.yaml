apiVersion: oracle.azure.m.upbound.io/v1beta1
kind: AutonomousDatabaseCloneFromDatabase
metadata:
  annotations:
    upjet.upbound.io/manual-intervention: This resource requires manual intervention.
    meta.upbound.io/example-id: oracle/v1beta1/autonomousdatabaseclonefromdatabase
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    adminPasswordSecretRef:
      key: example-key
      name: example-secret
    allowedIpAddresses: []
    autoScalingEnabled: false
    autoScalingForStorageEnabled: true
    backupRetentionPeriodInDays: 7
    characterSet: AL32UTF8
    cloneType: Full
    computeCount: 2
    computeModel: ECPU
    dataStorageSizeInTb: 1
    databaseVersion: 19c
    databaseWorkload: OLTP
    displayName: ExampleClone
    licenseModel: LicenseIncluded
    location: eastus
    mtlsConnectionRequired: true
    nationalCharacterSet: AL16UTF16
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    sourceAutonomousDatabaseIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    subnetIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
---
apiVersion: oracle.azure.m.upbound.io/v1beta1
kind: AutonomousDatabase
metadata:
  annotations:
    upjet.upbound.io/manual-intervention: This resource requires manual intervention.
    meta.upbound.io/example-id: oracle/v1beta1/autonomousdatabaseclonefromdatabase
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    adminPasswordSecretRef:
      key: example-key
      name: example-secret
    allowedIps: []
    autoScalingEnabled: false
    autoScalingForStorageEnabled: true
    backupRetentionPeriodInDays: 7
    characterSet: AL32UTF8
    computeCount: 2
    computeModel: ECPU
    dataStorageSizeInTbs: 1
    dbVersion: 19c
    dbWorkload: OLTP
    displayName: Example
    licenseModel: LicenseIncluded
    location: eastus
    mtlsConnectionRequired: true
    nationalCharacterSet: AL16UTF16
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    subnetIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
---
apiVersion: network.azure.m.upbound.io/v1beta1
kind: Subnet
metadata:
  annotations:
    upjet.upbound.io/manual-intervention: This resource requires manual intervention.
    meta.upbound.io/example-id: oracle/v1beta1/autonomousdatabase
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    addressPrefixes:
      - 10.0.2.0/24
    delegation:
      - name: oracle
        serviceDelegation:
          name: Oracle.Database/networkAttachments
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    virtualNetworkNameSelector:
      matchLabels:
        testing.upbound.io/example-name: example
---
apiVersion: network.azure.m.upbound.io/v1beta1
kind: VirtualNetwork
metadata:
  annotations:
    upjet.upbound.io/manual-intervention: This resource requires manual intervention.
    meta.upbound.io/example-id: oracle/v1beta1/autonomousdatabase
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    addressSpace:
      - 10.0.0.0/16
    location: West Europe
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: example
---
apiVersion: azure.m.upbound.io/v1beta1
kind: ResourceGroup
metadata:
  annotations:
    upjet.upbound.io/manual-intervention: This resource requires manual intervention.
    meta.upbound.io/example-id: oracle/v1beta1/autonomousdatabaseclonefromdatabase
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    location: eastus
---
apiVersion: v1
data:
  example-key: dXBiMHVuZHIwY2s1ITMxMzM3
kind: Secret
metadata:
  name: example-secret
  namespace: upbound-system
  annotations:
    upjet.upbound.io/manual-intervention: This resource requires manual intervention.
type: Opaque
