apiVersion: containerregistry.azure.upbound.io/v1beta1
kind: CacheRule
metadata:
  annotations:
    meta.upbound.io/example-id: containerregistry/v1beta1/cacherule
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    containerRegistryIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    credentialSetIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    sourceRepo: docker.io/library/hello-world
    targetRepo: target

---

apiVersion: containerregistry.azure.upbound.io/v1beta1
kind: CredentialSet
metadata:
  annotations:
    meta.upbound.io/example-id: containerregistry/v1beta1/cacherule
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    authenticationCredentials:
      passwordSecretId: "https://example-keyvault.vault.azure.net/secrets/example-user-password"
      usernameSecretId: "https://example-keyvault.vault.azure.net/secrets/example-user-name"
    containerRegistryIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    identity:
      type: SystemAssigned
    loginServer: docker.io

---

apiVersion: containerregistry.azure.upbound.io/v1beta2
kind: Registry
metadata:
  annotations:
    meta.upbound.io/example-id: containerregistry/v1beta1/cacherule
  labels:
    testing.upbound.io/example-name: example
  name: acrcacherulev1b1
spec:
  forProvider:
    location: West Europe
    resourceGroupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    sku: Basic

---

apiVersion: azure.upbound.io/v1beta1
kind: ResourceGroup
metadata:
  annotations:
    meta.upbound.io/example-id: containerregistry/v1beta1/cacherule
  labels:
    testing.upbound.io/example-name: example
  name: acrcacherulev1b1
spec:
  forProvider:
    location: West Europe
